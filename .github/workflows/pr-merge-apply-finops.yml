name: Apply FinOps Remediation on merge (static creds)

# Fires when a remediation PR is merged to main (or any push to main that
# touches remediations/proposed/**). Re-runs preflight via OIDC (read-only)
# and, if it passes, performs the mutation per finding using the cloud
# vendor CLI (aws / gcloud / az) — not stackql — because the Cloud-Control
# / ARM CLIs are the direct, well-supported path for deletes. Applied
# directories are git-moved from remediations/proposed/ to
# remediations/applied/ to leave an audit trail and prevent re-application.
#
# Mutation credentials are read from SANDBOX_* repo secrets, populated
# via cicd/scripts/replicate_to_gh_secrets.sh.

on:
  push:
    tags:
      - 'apply-finops-*'
    branches:
      - main
    paths:
      - 'remediations/proposed/**'

permissions:
  id-token: write       # OIDC for the preflight re-check
  contents: write       # commit the proposed -> applied rename

concurrency:
  group: apply-finops-main
  cancel-in-progress: false

jobs:
  apply:
    env:
      GOOGLE_CREDENTIALS:   ${{ secrets.SANDBOX_GOOGLE_CREDENTIALS }}
      AZURE_TENANT_ID:      ${{ secrets.SANDBOX_AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:      ${{ secrets.SANDBOX_AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET:  ${{ secrets.SANDBOX_AZURE_CLIENT_SECRET }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.SANDBOX_AZURE_SUBSCRIPTION_ID }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.SANDBOX_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SANDBOX_AWS_SECRET_ACCESS_KEY }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect newly merged remediation directories
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER:  ${{ github.event.after }}
        run: |
          set -euo pipefail
          # Tag pushes have BEFORE = 000…0 → git diff returns nothing.
          # Fall back to "all proposed remediation.sql in the working tree".
          if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            mapfile -t rem < <(find remediations/proposed -type f -name remediation.sql 2>/dev/null)
          else
            mapfile -t rem < <(
              git diff --name-only --diff-filter=AM "$BEFORE" "$AFTER" -- \
                'remediations/proposed/**/remediation.sql'
            )
          fi
          if [ "${#rem[@]}" -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no new remediation.sql in this push"
            exit 0
          fi

          # Sibling preflight.sql for each remediation.sql
          mapfile -t pre < <(printf '%s\n' "${rem[@]}" | sed 's|remediation\.sql$|preflight.sql|')

          # Single-item {x} is a literal — only wrap in braces when there are 2+.
          if [ "${#pre[@]}" -eq 1 ]; then pre_glob="${pre[0]}"; else pre_glob="{$(IFS=,; echo "${pre[*]}")}"; fi
          if [ "${#rem[@]}" -eq 1 ]; then rem_glob="${rem[0]}"; else rem_glob="{$(IFS=,; echo "${rem[*]}")}"; fi
          echo "preflight_glob=$pre_glob"     >> "$GITHUB_OUTPUT"
          echo "remediation_glob=$rem_glob"   >> "$GITHUB_OUTPUT"
          echo "found=true"                   >> "$GITHUB_OUTPUT"

          # File list for the post-apply move step
          printf '%s\n' "${rem[@]}" > "$RUNNER_TEMP/remediation-files.txt"
          printf '::notice::will apply: %s\n' "${rem[@]}"

      - name: Check provider prerequisites
        if: steps.detect.outputs.found == 'true'
        id: provider-gate
        env:
          REQUESTED_TARGETS: finops-aws finops-gcp finops-azure
          SANDBOX_AWS_ACCESS_KEY_ID: ${{ secrets.SANDBOX_AWS_ACCESS_KEY_ID }}
          SANDBOX_AWS_SECRET_ACCESS_KEY: ${{ secrets.SANDBOX_AWS_SECRET_ACCESS_KEY }}
          SANDBOX_GOOGLE_CREDENTIALS: ${{ secrets.SANDBOX_GOOGLE_CREDENTIALS }}
          SANDBOX_AZURE_TENANT_ID: ${{ secrets.SANDBOX_AZURE_TENANT_ID }}
          SANDBOX_AZURE_CLIENT_ID: ${{ secrets.SANDBOX_AZURE_CLIENT_ID }}
          SANDBOX_AZURE_CLIENT_SECRET: ${{ secrets.SANDBOX_AZURE_CLIENT_SECRET }}
          SANDBOX_AZURE_SUBSCRIPTION_ID: ${{ secrets.SANDBOX_AZURE_SUBSCRIPTION_ID }}
        run: bash cicd/scripts/provider_gate.sh sandbox

      - name: All providers skipped
        if: steps.detect.outputs.found == 'true' && steps.provider-gate.outputs.has_effective_targets != 'true'
        run: |
          echo "::warning::No runnable providers remain after prerequisite checks. See 'Provider Prerequisite Check' in the step summary for missing secrets."

      - name: Preflight (inline stackql, OIDC)
        if: steps.detect.outputs.found == 'true' && steps.provider-gate.outputs.has_effective_targets == 'true'
        env:
          REM_FILES: ${{ runner.temp }}/remediation-files.txt
          AWS_ENABLED: ${{ steps.provider-gate.outputs.aws_enabled }}
          GCP_ENABLED: ${{ steps.provider-gate.outputs.gcp_enabled }}
          AZURE_ENABLED: ${{ steps.provider-gate.outputs.azure_enabled }}
          AWS_RESTORE: ${{ steps.provider-gate.outputs.aws_restore }}
          GCP_RESTORE: ${{ steps.provider-gate.outputs.gcp_restore }}
          AZURE_RESTORE: ${{ steps.provider-gate.outputs.azure_restore }}
        run: |
          set -uo pipefail
          cd "$GITHUB_WORKSPACE"
          curl -fsSL https://releases.stackql.io/stackql/latest/stackql_linux_amd64.zip -o /tmp/stackql.zip
          unzip -q /tmp/stackql.zip -d /usr/local/bin && chmod +x /usr/local/bin/stackql
          stackql exec "registry pull aws;     registry pull google;     registry pull azure;     registry pull entra_id;"


          fail=0
          skipped=0
          while IFS= read -r r; do
            f="$(dirname "$r")/finding.json"
            [ -f "$f" ] || continue

            provider="$(jq -r '.provider // empty' "$f")"
            if [ -z "$provider" ]; then
              target="$(jq -r '.target // empty' "$f")"
              provider="${target#finops-}"
            fi
            case "$provider" in
              aws)
                if [ "$AWS_ENABLED" != "true" ]; then
                  echo "::warning::SKIP $f (provider=aws): prerequisites missing. To restore set: $AWS_RESTORE"
                  skipped=$((skipped+1))
                  continue
                fi
                ;;
              gcp)
                if [ "$GCP_ENABLED" != "true" ]; then
                  echo "::warning::SKIP $f (provider=gcp): prerequisites missing. To restore set: $GCP_RESTORE"
                  skipped=$((skipped+1))
                  continue
                fi
                ;;
              azure)
                if [ "$AZURE_ENABLED" != "true" ]; then
                  echo "::warning::SKIP $f (provider=azure): prerequisites missing. To restore set: $AZURE_RESTORE"
                  skipped=$((skipped+1))
                  continue
                fi
                ;;
            esac

            q="$(jq -r '.suggested_remediation.preflight_query // empty' "$f")"
            [ -n "$q" ] || { echo "::warning::$f no preflight_query"; continue; }
            out="$(stackql exec --output json "$q" 2>&1)"
            rows="$(echo "$out" | jq 'if type=="array" then length else 0 end' 2>/dev/null || echo 0)"
            if [ "${rows:-0}" -gt 0 ]; then
              echo "::group::PASS $f ($rows row)"
              echo "QUERY : $q"; echo "$out" | jq .
              echo "::endgroup::"
            else
              echo "::error::FAIL $f — $out"
              fail=$((fail+1))
            fi
          done < "$REM_FILES"
          if [ "$skipped" -gt 0 ]; then
            echo "::notice::preflight skipped $skipped finding(s) because provider prerequisites are missing."
          fi
          if [ "$fail" -gt 0 ]; then
            echo "::error::Preflight failed on merge — refusing to mutate. Drift since PR approval likely."
            exit 1
          fi

      # --- mutation credentials (static, SANDBOX_*) ---------------------
      # - name: Configure AWS creds (static, SANDBOX)
      #   if: steps.detect.outputs.found == 'true'
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id:     ${{ secrets.SANDBOX_AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.SANDBOX_AWS_SECRET_ACCESS_KEY }}
      #     aws-region:            us-east-1

      # - name: Configure GCP creds (static, SANDBOX)
      #   if: steps.detect.outputs.found == 'true'
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.SANDBOX_GOOGLE_CREDENTIALS }}

      - name: Install gcloud
        if: steps.detect.outputs.found == 'true' && steps.provider-gate.outputs.has_effective_targets == 'true'
        uses: google-github-actions/setup-gcloud@v2

      # - name: Configure Azure creds (static, SANDBOX)
      #   if: steps.detect.outputs.found == 'true'
      #   uses: azure/login@v2
      #   with:
      #     creds: |
      #       {
      #         "clientId":       "${{ secrets.SANDBOX_AZURE_CLIENT_ID }}",
      #         "clientSecret":   "${{ secrets.SANDBOX_AZURE_CLIENT_SECRET }}",
      #         "tenantId":       "${{ secrets.SANDBOX_AZURE_TENANT_ID }}",
      #         "subscriptionId": "${{ secrets.SANDBOX_AZURE_SUBSCRIPTION_ID }}"
      #       }

      # --- install stackql (mutating creds set by the SANDBOX auth steps) ---
      - name: Install stackql + providers
        if: steps.detect.outputs.found == 'true' && steps.provider-gate.outputs.has_effective_targets == 'true'
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          curl -fsSL https://releases.stackql.io/stackql/latest/stackql_linux_amd64.zip -o stackql.zip
          unzip -q stackql.zip && chmod +x stackql
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP:$PATH"
          stackql exec "registry pull aws;"
          stackql exec "registry pull google;"
          stackql exec "registry pull azure;"

      # --- apply per finding via stackql -------------------------
      # Per finding, run suggested_remediation.sql_query verbatim via stackql.
      # Auth: AWS via env vars (configure-aws-credentials), GCP via the SA
      # JSON env var, Azure via the SP env vars. Nothing else; no CLI.
      - name: Apply (stackql)
        if: steps.detect.outputs.found == 'true' && steps.provider-gate.outputs.has_effective_targets == 'true'
        id: apply
        env:
          REM_FILES: ${{ runner.temp }}/remediation-files.txt
          RESULTS_JSON: ${{ runner.temp }}/apply-results.json
          AWS_ENABLED: ${{ steps.provider-gate.outputs.aws_enabled }}
          GCP_ENABLED: ${{ steps.provider-gate.outputs.gcp_enabled }}
          AZURE_ENABLED: ${{ steps.provider-gate.outputs.azure_enabled }}
          AWS_RESTORE: ${{ steps.provider-gate.outputs.aws_restore }}
          GCP_RESTORE: ${{ steps.provider-gate.outputs.gcp_restore }}
          AZURE_RESTORE: ${{ steps.provider-gate.outputs.azure_restore }}
          # SANDBOX static creds — stackql picks AWS up from env automatically,
          # GCP from the application-default credentials file, Azure from SP env.
          GOOGLE_CREDENTIALS:   ${{ secrets.SANDBOX_GOOGLE_CREDENTIALS }}
          AZURE_TENANT_ID:      ${{ secrets.SANDBOX_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:      ${{ secrets.SANDBOX_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:  ${{ secrets.SANDBOX_AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.SANDBOX_AZURE_SUBSCRIPTION_ID }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.SANDBOX_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SANDBOX_AWS_SECRET_ACCESS_KEY }}
        run: |
          set -uo pipefail

          : > "$RESULTS_JSON.tmp"
          applied=0
          failed=0
          skipped=0

          while IFS= read -r f; do
            dir="$(dirname "$f")"
            finding="$dir/finding.json"
            if [ ! -f "$finding" ]; then
              echo "::warning::no finding.json in $dir, skipping"
              skipped=$((skipped+1))
              continue
            fi
            check_id="$(jq -r '.check_id' "$finding")"
            provider="$(jq -r '.provider // empty' "$finding")"
            if [ -z "$provider" ]; then
              target="$(jq -r '.target // empty' "$finding")"
              provider="${target#finops-}"
            fi
            sql="$(jq -r '.suggested_remediation.sql_query // empty' "$finding")"
            stdout_log="$dir/_apply.stdout.log"
            stderr_log="$dir/_apply.stderr.log"

            case "$provider" in
              aws)
                if [ "$AWS_ENABLED" != "true" ]; then
                  echo "::warning::SKIP $dir (provider=aws): prerequisites missing. To restore set: $AWS_RESTORE"
                  skipped=$((skipped+1))
                  jq -n --arg dir "$dir" --arg cid "$check_id" --arg r "$AWS_RESTORE" \
                    '{dir:$dir, check_id:$cid, status:"skipped", reason:("missing provider prerequisites: " + $r)}' \
                    >> "$RESULTS_JSON.tmp"
                  continue
                fi
                ;;
              gcp)
                if [ "$GCP_ENABLED" != "true" ]; then
                  echo "::warning::SKIP $dir (provider=gcp): prerequisites missing. To restore set: $GCP_RESTORE"
                  skipped=$((skipped+1))
                  jq -n --arg dir "$dir" --arg cid "$check_id" --arg r "$GCP_RESTORE" \
                    '{dir:$dir, check_id:$cid, status:"skipped", reason:("missing provider prerequisites: " + $r)}' \
                    >> "$RESULTS_JSON.tmp"
                  continue
                fi
                ;;
              azure)
                if [ "$AZURE_ENABLED" != "true" ]; then
                  echo "::warning::SKIP $dir (provider=azure): prerequisites missing. To restore set: $AZURE_RESTORE"
                  skipped=$((skipped+1))
                  jq -n --arg dir "$dir" --arg cid "$check_id" --arg r "$AZURE_RESTORE" \
                    '{dir:$dir, check_id:$cid, status:"skipped", reason:("missing provider prerequisites: " + $r)}' \
                    >> "$RESULTS_JSON.tmp"
                  continue
                fi
                ;;
            esac

            if [ -z "$sql" ]; then
              echo "::warning::no suggested_remediation.sql_query for $check_id at $dir; skipping"
              skipped=$((skipped+1))
              jq -n --arg dir "$dir" --arg cid "$check_id" \
                '{dir:$dir, check_id:$cid, status:"skipped", reason:"no suggested_remediation.sql_query"}' \
                >> "$RESULTS_JSON.tmp"
              continue
            fi

            echo "::group::$check_id $dir"
            echo "QUERY : $sql"
            stackql exec --output json "$sql" >"$stdout_log" 2>"$stderr_log"
            rc=$?
            echo "EXIT  : $rc"
            echo "STDOUT: $(cat "$stdout_log")"
            echo "STDERR: $(cat "$stderr_log")"
            echo "::endgroup::"

            if [ "$rc" -eq 0 ]; then
              applied=$((applied+1)); echo "::notice::applied (stackql) $check_id at $dir"
              jq -n --arg dir "$dir" --arg cid "$check_id" --arg sql "$sql" \
                '{dir:$dir, check_id:$cid, status:"applied", source:"suggested_remediation.sql_query", sql_query:$sql, exit_code:0}' \
                >> "$RESULTS_JSON.tmp"
            else
              failed=$((failed+1))
              echo "::error::stackql failed ($rc) for $check_id at $dir — see $stderr_log"
              jq -n --arg dir "$dir" --arg cid "$check_id" --arg sql "$sql" --argjson rc "$rc" \
                '{dir:$dir, check_id:$cid, status:"failed", source:"suggested_remediation.sql_query", sql_query:$sql, exit_code:$rc}' \
                >> "$RESULTS_JSON.tmp"
            fi
            continue

            # legacy per-check_id dispatch — retained only as dead code in case
            # the upstream stops shipping suggested_remediation.sql_query.
            case "$check_id" in
              never)
                rid="$(jq -r '.fields.id' "$finding")"
                az vm delete --ids "$rid" --yes >"$stdout_log" 2>"$stderr_log"
                rc=$?
                ;;
              *)
                echo "::warning::no CLI mapping for check_id=$check_id ($dir); skipping"
                skipped=$((skipped+1))
                jq -n --arg dir "$dir" --arg cid "$check_id" \
                  '{dir:$dir, check_id:$cid, status:"skipped", reason:"no CLI mapping"}' >> "$RESULTS_JSON.tmp"
                continue
                ;;
            esac

            if [ "$rc" -eq 0 ]; then
              applied=$((applied+1))
              status="applied"
              echo "::notice::applied $check_id at $dir"
            else
              failed=$((failed+1))
              status="failed"
              echo "::error::CLI failed ($rc) for $check_id at $dir — see $stderr_log"
            fi
            jq -n --arg dir "$dir" --arg cid "$check_id" --arg status "$status" --argjson rc "$rc" \
              '{dir:$dir, check_id:$cid, status:$status, exit_code:$rc}' >> "$RESULTS_JSON.tmp"
          done < "$REM_FILES"

          jq -s '.' "$RESULTS_JSON.tmp" > "$RESULTS_JSON"
          rm -f "$RESULTS_JSON.tmp"

          echo "applied=$applied" >> "$GITHUB_OUTPUT"
          echo "failed=$failed"   >> "$GITHUB_OUTPUT"
          echo "skipped=$skipped" >> "$GITHUB_OUTPUT"
          echo "results_json=$RESULTS_JSON" >> "$GITHUB_OUTPUT"
          if [ "$failed" -eq 0 ]; then
            echo "pass=true"  >> "$GITHUB_OUTPUT"
          else
            echo "pass=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Post apply check (inline stackql, OIDC)
        if: steps.detect.outputs.found == 'true' && steps.provider-gate.outputs.has_effective_targets == 'true'
        env:
          REM_FILES: ${{ runner.temp }}/remediation-files.txt
          AWS_ENABLED: ${{ steps.provider-gate.outputs.aws_enabled }}
          GCP_ENABLED: ${{ steps.provider-gate.outputs.gcp_enabled }}
          AZURE_ENABLED: ${{ steps.provider-gate.outputs.azure_enabled }}
          AWS_RESTORE: ${{ steps.provider-gate.outputs.aws_restore }}
          GCP_RESTORE: ${{ steps.provider-gate.outputs.gcp_restore }}
          AZURE_RESTORE: ${{ steps.provider-gate.outputs.azure_restore }}
        run: |
          set -uo pipefail
          sleep 10  # eventual consistency buffer — most APIs are eventually consistent on deletes; this mitigates flakes without a full retry loop
          cd "$GITHUB_WORKSPACE"
          curl -fsSL https://releases.stackql.io/stackql/latest/stackql_linux_amd64.zip -o /tmp/stackql.zip
          unzip -q /tmp/stackql.zip -d /usr/local/bin && chmod +x /usr/local/bin/stackql
          stackql exec "registry pull aws;     registry pull google;     registry pull azure;     registry pull entra_id;"

          fail=0
          skipped=0
          while IFS= read -r r; do
            f="$(dirname "$r")/finding.json"
            [ -f "$f" ] || continue

            provider="$(jq -r '.provider // empty' "$f")"
            if [ -z "$provider" ]; then
              target="$(jq -r '.target // empty' "$f")"
              provider="${target#finops-}"
            fi
            case "$provider" in
              aws)
                if [ "$AWS_ENABLED" != "true" ]; then
                  echo "::warning::SKIP $f (provider=aws): prerequisites missing. To restore set: $AWS_RESTORE"
                  skipped=$((skipped+1))
                  continue
                fi
                ;;
              gcp)
                if [ "$GCP_ENABLED" != "true" ]; then
                  echo "::warning::SKIP $f (provider=gcp): prerequisites missing. To restore set: $GCP_RESTORE"
                  skipped=$((skipped+1))
                  continue
                fi
                ;;
              azure)
                if [ "$AZURE_ENABLED" != "true" ]; then
                  echo "::warning::SKIP $f (provider=azure): prerequisites missing. To restore set: $AZURE_RESTORE"
                  skipped=$((skipped+1))
                  continue
                fi
                ;;
            esac

            q="$(jq -r '.suggested_remediation.preflight_query // empty' "$f")"
            [ -n "$q" ] || { echo "::warning::$f no preflight_query"; continue; }
            out="$(stackql exec --output json "$q" 2>&1)"
            rows="$(echo "$out" | jq 'if type=="array" then length else 0 end' 2>/dev/null || echo 0)"
            # Post-apply: mutation happened pre-merge; resource should be gone.
            if [ "${rows:-0}" -eq 0 ]; then
              echo "::notice::PASS $f (0 rows — resource gone)"
            else
              echo "::group::FAIL $f ($rows row(s) remaining)"
              echo "QUERY : $q"; echo "$out" | jq .
              echo "::endgroup::"
              fail=$((fail+1))
            fi
          done < "$REM_FILES"
          if [ "$skipped" -gt 0 ]; then
            echo "::notice::post-apply skipped $skipped finding(s) because provider prerequisites are missing."
          fi
          if [ "$fail" -gt 0 ]; then
            echo "::error::Post-apply check failed — resource(s) still present after merge."
            exit 1
          fi

        
