name: Cloud Audit (OIDC)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      google-org-id:
        description: GCP organization ID, digits only (for gcp-org)
        required: false
        default: '141318256085'
      aws-region:
        description: AWS region — S3 endpoint + region-sweep seed
        required: false
        default: us-east-1
      azure-mgmt-group:
        description: Azure management group ID (blank = all tenant subscriptions)
        required: false
        default: ''
      target:
        description: Space-separated deep targets
        required: false
        default: s3 aws-regions gcp-org azure-org entra
      max-nodes:
        description: 'Budget: max org-nodes visited (-1 = unlimited)'
        required: false
        default: '-1'
      send-summary:
        description: Send summary data to StackqQL (requires STACKQL_OBS_AUDIT_UPLOAD_KEY secret)
        required: false
        default: 'true'

jobs:
  oidc-audit:
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # required: GitHub OIDC token issuance
      contents: read
    steps:
      - uses: stackql/stackql-audit-action/actions/oidc@v0.7.2
        with:
          target: ${{ inputs.target }}
          # AWS (OIDC -> sts:AssumeRoleWithWebIdentity)
          aws-role-arn: ${{ secrets.STACKQL_ID_FED_AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          # GCP (Workload Identity Federation -> SA impersonation)
          gcp-workload-identity-provider: ${{ secrets.STACKQL_ID_FED_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-sa-email: ${{ secrets.STACKQL_ID_FED_GCP_SERVICE_ACCOUNT }}
          google-org-id: ${{ inputs.google-org-id }}
          # Azure (federated identity, no client secret)
          azure-tenant-id: ${{ secrets.STACKQL_ID_FED_AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.STACKQL_ID_FED_AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_INTEGRATION_TESTING_SUB_ID }}
          azure-mgmt-group: ${{ inputs.azure-mgmt-group }}
          # Budget + output
          max-nodes: ${{ inputs.max-nodes }}
          timeout-seconds: '1800'
          upload-logs: 'true'

      - uses: actions/download-artifact@v4
        id: download-data-streams
        with:
          name: deep-audit-data-streams
          path: deep-audit-data-streams

      - name: Process data streams
        env:
          STACKQL_OBS_AUDIT_UPLOAD_KEY: ${{ secrets.STACKQL_OBS_AUDIT_UPLOAD_KEY }}
        run: |
          ls -d "$PWD"/deep-audit-data-streams/*
          _summary="$(cat "$GITHUB_WORKSPACE"/deep-audit-data-streams/*/summary.json)"
          if [ -z "$_summary" ]; then
            echo "No summary data found; skipping upload."
            exit 0
          fi
          _payload='{
            "timestamp": '"$(date +%s)"',
            "audit": {
              "type": "cross_cloud_oidc",
              "target": {
                "enterprise": {
                  "name": "StackqQL Studios PTY LTD",
                  "short_name": "stackql"
                },
                "hierarchy": {
                  "google": {
                    "org_id": "'"${{ inputs.google-org-id }}"'"
                  },
                  "aws": {
                    "region": "'"${{ inputs.aws-region }}"'"
                  },
                  "azure": {
                    "mgmt_group": "'"${{ inputs.azure-mgmt-group }}"'"
                  }
                }
              },
              "data": '"${_summary}"'
            }
          }'
          echo "#### Payload ####"
          echo
          echo "$_payload" | jq .
          echo
          echo "#### ####"
          if [ "${{ inputs.send-summary }}" = 'true' ]; then
            echo "Uploading summary data to StackqQL..."
          else
            echo "send-summary input is false; skipping upload."
            exit 0
          fi
          curl -X POST https://stackql-backend-dev-01.fly.dev/api/audit/ingest \
          -H "X-API-KEY: ${STACKQL_OBS_AUDIT_UPLOAD_KEY}" -H "Content-Type: application/json" \
          -d "${_payload}"
