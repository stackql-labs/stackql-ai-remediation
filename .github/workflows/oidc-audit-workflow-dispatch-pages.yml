name: Cloud Audit Pages (OIDC)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      google-org-id:
        description: GCP organization ID, digits only (for gcp-org)
        required: false
        default: '141318256085'
      aws-region:
        description: AWS region — S3 endpoint + region-sweep seed
        required: false
        default: us-east-1
      azure-mgmt-group:
        description: Azure management group ID (blank = all tenant subscriptions)
        required: false
        default: ''
      target:
        description: Space-separated deep targets
        required: false
        default: s3 aws-regions gcp-org azure-org entra
      max-nodes:
        description: 'Budget: max org-nodes visited (-1 = unlimited)'
        required: false
        default: '-1'
      send-summary:
        description: Send summary data to StackQL BFF (requires STACKQL_OBS_AUDIT_UPLOAD_KEY secret)
        required: false
        default: 'false'
      publish-page:
        description: Publish static findings page to gh-pages branch
        required: false
        default: 'true'

jobs:
  oidc-audit-pages:
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # required: GitHub OIDC token issuance
      contents: write       # required: push static findings + history to gh-pages

    env:
      AUDIT_TARGET: ${{ github.event.inputs.target || 's3 aws-regions gcp-org azure-org entra' }}
      AWS_REGION: ${{ github.event.inputs.aws-region || 'us-east-1' }}
      GOOGLE_ORG_ID: ${{ github.event.inputs.google-org-id || '141318256085' }}
      AZURE_MGMT_GROUP: ${{ github.event.inputs.azure-mgmt-group || '' }}
      MAX_NODES: ${{ github.event.inputs.max-nodes || '-1' }}
      SEND_SUMMARY: ${{ github.event.inputs.send-summary || 'false' }}
      PUBLISH_PAGE: ${{ github.event.inputs.publish-page || 'true' }}

    steps:
      - name: Run StackQL OIDC audit
        uses: stackql/stackql-audit-action/actions/oidc@v0.6.1
        with:
          target: ${{ env.AUDIT_TARGET }}

          # AWS (OIDC -> sts:AssumeRoleWithWebIdentity)
          aws-role-arn: ${{ secrets.STACKQL_ID_FED_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

          # GCP (Workload Identity Federation -> SA impersonation)
          gcp-workload-identity-provider: ${{ secrets.STACKQL_ID_FED_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-sa-email: ${{ secrets.STACKQL_ID_FED_GCP_SERVICE_ACCOUNT }}
          google-org-id: ${{ env.GOOGLE_ORG_ID }}

          # Azure (federated identity, no client secret)
          azure-tenant-id: ${{ secrets.STACKQL_ID_FED_AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.STACKQL_ID_FED_AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_INTEGRATION_TESTING_SUB_ID }}
          azure-mgmt-group: ${{ env.AZURE_MGMT_GROUP }}

          # Budget + output
          max-nodes: ${{ env.MAX_NODES }}
          timeout-seconds: '1800'
          upload-logs: 'true'

      - name: Download audit artifact
        uses: actions/download-artifact@v4
        with:
          name: deep-audit-data-streams
          path: deep-audit-data-streams

      - name: Prepare summary payload
        env:
          STACKQL_OBS_AUDIT_UPLOAD_KEY: ${{ secrets.STACKQL_OBS_AUDIT_UPLOAD_KEY }}
        run: |
          set -euo pipefail

          summary_file="$(find "$GITHUB_WORKSPACE/deep-audit-data-streams" -name summary.json -type f | head -n 1)"
          if [ -z "${summary_file}" ]; then
            echo "No summary.json found."
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/build/audit"
          cp "${summary_file}" "$GITHUB_WORKSPACE/build/audit/summary.json"

          jq -n \
            --argjson ts "$(date +%s)" \
            --arg run_id "$(date -u +%Y-%m-%dT%H-%M-%SZ)" \
            --arg workflow_run_id "${GITHUB_RUN_ID}" \
            --arg workflow_run_number "${GITHUB_RUN_NUMBER}" \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg target "${AUDIT_TARGET}" \
            --arg google_org_id "${GOOGLE_ORG_ID}" \
            --arg aws_region "${AWS_REGION}" \
            --arg azure_mgmt_group "${AZURE_MGMT_GROUP}" \
            --slurpfile summary "${summary_file}" \
            '{
              timestamp: $ts,
              run_id: $run_id,
              workflow: {
                repository: $repository,
                run_id: $workflow_run_id,
                run_number: $workflow_run_number,
                commit_sha: $commit_sha
              },
              audit: {
                type: "cross_cloud_oidc",
                target: {
                  enterprise: {
                    name: "StackQL Studios PTY LTD",
                    short_name: "stackql"
                  },
                  hierarchy: {
                    google: { org_id: $google_org_id },
                    aws: { region: $aws_region },
                    azure: { mgmt_group: $azure_mgmt_group }
                  },
                  requested: $target
                },
                data: $summary[0]
              }
            }' > "$GITHUB_WORKSPACE/build/audit/payload.json"

          echo "#### Payload ####"
          jq . "$GITHUB_WORKSPACE/build/audit/payload.json"
          echo "#### ####"

          if [ "${SEND_SUMMARY}" = 'true' ]; then
            echo "Uploading summary data to StackQL BFF..."
            curl -fsS -X POST https://stackql-backend-dev-01.fly.dev/api/audit/ingest \
              -H "X-API-KEY: ${STACKQL_OBS_AUDIT_UPLOAD_KEY}" \
              -H "Content-Type: application/json" \
              --data-binary "@$GITHUB_WORKSPACE/build/audit/payload.json"
          else
            echo "send-summary is false; skipping BFF upload."
          fi

      - name: Publish static findings page with history
        if: env.PUBLISH_PAGE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          repo_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          workdir="$GITHUB_WORKSPACE/pages"
          run_id="$(jq -r '.run_id' "$GITHUB_WORKSPACE/build/audit/payload.json")"

          if git ls-remote --exit-code --heads "${repo_url}" gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --single-branch "${repo_url}" "${workdir}"
          else
            mkdir -p "${workdir}"
            git -C "${workdir}" init
            git -C "${workdir}" checkout --orphan gh-pages
            git -C "${workdir}" remote add origin "${repo_url}"
          fi

          mkdir -p "${workdir}/audit/runs"

          if [ -f "${workdir}/audit/latest.json" ]; then
            cp "${workdir}/audit/latest.json" "${workdir}/audit/previous.json"
          else
            cp "$GITHUB_WORKSPACE/build/audit/payload.json" "${workdir}/audit/previous.json"
          fi

          cp "$GITHUB_WORKSPACE/build/audit/payload.json" "${workdir}/audit/latest.json"
          cp "$GITHUB_WORKSPACE/build/audit/payload.json" "${workdir}/audit/runs/${run_id}.json"

          jq -n \
            --slurpfile previous "${workdir}/audit/previous.json" \
            --slurpfile latest "${workdir}/audit/latest.json" \
            '{
              previous_run_id: $previous[0].run_id,
              latest_run_id: $latest[0].run_id,
              previous_timestamp: $previous[0].timestamp,
              latest_timestamp: $latest[0].timestamp,
              note: "Generic diff metadata. UI should use stable finding IDs when present for exact new/resolved calculation.",
              previous: $previous[0].audit.data,
              latest: $latest[0].audit.data
            }' > "${workdir}/audit/diff-latest.json"

          jq -s '
            def findings: [.audit.data | .. | objects | select(.severity | type == "string")];
            def count($s): findings | map(select(.severity | ascii_upcase == $s)) | length;
            sort_by(.timestamp)
            | map({
                run_id,
                timestamp,
                total_findings: (findings | length),
                high: count("HIGH"),
                medium: count("MEDIUM"),
                low: count("LOW")
              })
            | .[-120:]
          ' "${workdir}"/audit/runs/*.json > "${workdir}/audit/trend-30d.json"

          cat > "${workdir}/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>StackQL Cloud Audit Findings</title>
            <style>
              body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0b1020; color: #eef2ff; }
              main { max-width: 1180px; margin: 0 auto; padding: 32px 20px 56px; }
              header { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 28px; }
              h1 { margin: 0; font-size: 28px; letter-spacing: -0.03em; }
              .sub { color: #aab4d4; margin-top: 6px; }
              button { background: #eef2ff; color: #0b1020; border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
              .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 18px; }
              .card, .panel { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 16px; box-shadow: 0 16px 40px rgba(0,0,0,0.18); }
              .label { color: #aab4d4; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
              .value { font-size: 30px; font-weight: 800; margin-top: 8px; }
              .panels { display: grid; grid-template-columns: 1fr; gap: 14px; }
              table { width: 100%; border-collapse: collapse; font-size: 14px; }
              th, td { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px 8px; text-align: left; vertical-align: top; }
              th { color: #aab4d4; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
              pre { overflow: auto; background: rgba(0,0,0,0.25); padding: 12px; border-radius: 12px; max-height: 420px; }
              a { color: #bfdbfe; }
              code { background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 6px; font-size: 12px; }
              .sev { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; }
              .sev-high { background: #7f1d1d; color: #fee2e2; }
              .sev-medium { background: #78350f; color: #fed7aa; }
              .sev-low { background: #1e3a8a; color: #bfdbfe; }
              .sev-none { background: rgba(255,255,255,0.1); color: #aab4d4; }
              .ctx { color: #aab4d4; font-size: 12px; }
              .empty { color: #aab4d4; padding: 16px 8px; }
              @media (max-width: 820px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } header { align-items: flex-start; flex-direction: column; } }
              @media print { body { background: white; color: black; } button { display: none; } .card, .panel { box-shadow: none; border-color: #ddd; background: white; } .sub, .label, th { color: #555; } a { color: black; } .no-print { display: none !important; } .sev-high { background: #fee2e2; color: #7f1d1d; } .sev-medium { background: #fed7aa; color: #78350f; } .sev-low { background: #dbeafe; color: #1e3a8a; } .ctx { color: #555; } }
            </style>
          </head>
          <body>
            <main>
              <header>
                <div>
                  <h1>Cloud Audit Findings</h1>
                  <div class="sub" id="run-meta">Loading latest audit…</div>
                </div>
                <button onclick="window.print()">Create summary PDF</button>
              </header>

              <section class="grid">
                <div class="card"><div class="label">Total findings</div><div class="value" id="total">—</div></div>
                <div class="card"><div class="label">High</div><div class="value" id="high">—</div></div>
                <div class="card"><div class="label">Medium</div><div class="value" id="medium">—</div></div>
                <div class="card"><div class="label">Low</div><div class="value" id="low">—</div></div>
              </section>

              <section class="panels">
                <div class="panel">
                  <h2>Findings</h2>
                  <table id="findings"><thead><tr><th>Target</th><th>Name</th><th>Severity</th><th>Context</th></tr></thead><tbody></tbody></table>
                </div>
                <div class="panel">
                  <h2>30-run trend</h2>
                  <table id="trend"><thead><tr><th>Run</th><th>Total</th><th>High</th><th>Medium</th><th>Low</th></tr></thead><tbody></tbody></table>
                </div>
                <div class="panel no-print" id="json-panel">
                  <h2>Latest summary JSON</h2>
                  <p><a href="audit/latest.json">latest.json</a> · <a href="audit/previous.json">previous.json</a> · <a href="audit/diff-latest.json">diff-latest.json</a> · <a href="audit/trend-30d.json">trend-30d.json</a></p>
                  <pre id="raw"></pre>
                </div>
              </section>
            </main>

            <script>
              const n = (value) => value === null || value === undefined ? '—' : value;
              const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
              const sevClass = (s) => {
                const u = String(s || '').toUpperCase();
                if (u === 'HIGH') return 'sev-high';
                if (u === 'MEDIUM') return 'sev-medium';
                if (u === 'LOW') return 'sev-low';
                return 'sev-none';
              };

              const collectFindings = (root) => {
                const out = [];
                const walk = (node, target) => {
                  if (Array.isArray(node)) { node.forEach(v => walk(v, target)); return; }
                  if (!node || typeof node !== 'object') return;
                  if (typeof node.severity === 'string') out.push({ target, ...node });
                  for (const v of Object.values(node)) walk(v, target);
                };
                for (const [target, value] of Object.entries(root || {})) walk(value, target);
                return out;
              };

              async function main() {
                const latest = await fetch('audit/latest.json').then(r => r.json());
                const trend = await fetch('audit/trend-30d.json').then(r => r.json()).catch(() => []);
                const data = latest.audit?.data || {};

                const findings = collectFindings(data);
                const counts = { HIGH: 0, MEDIUM: 0, LOW: 0 };
                for (const f of findings) {
                  const u = String(f.severity || '').toUpperCase();
                  if (u in counts) counts[u]++;
                }

                document.getElementById('run-meta').textContent = `${latest.audit?.type || 'audit'} · run ${latest.run_id || 'unknown'} · ${latest.workflow?.repository || ''}`;
                document.getElementById('total').textContent = findings.length;
                document.getElementById('high').textContent = counts.HIGH;
                document.getElementById('medium').textContent = counts.MEDIUM;
                document.getElementById('low').textContent = counts.LOW;
                document.getElementById('raw').textContent = JSON.stringify(data, null, 2);

                const ftbody = document.querySelector('#findings tbody');
                if (findings.length === 0) {
                  ftbody.innerHTML = `<tr><td colspan="4" class="empty">No findings.</td></tr>`;
                } else {
                  const severityRank = { HIGH: 0, MEDIUM: 1, LOW: 2 };
                  const sorted = findings.slice().sort((a, b) => {
                    const ra = severityRank[String(a.severity || '').toUpperCase()] ?? 9;
                    const rb = severityRank[String(b.severity || '').toUpperCase()] ?? 9;
                    if (ra !== rb) return ra - rb;
                    return String(a.target).localeCompare(String(b.target));
                  });
                  ftbody.innerHTML = sorted.map(f => {
                    const { target, severity, name, ...rest } = f;
                    const ctx = Object.entries(rest)
                      .filter(([, v]) => v !== null && v !== undefined && v !== '')
                      .map(([k, v]) => `${esc(k)}: ${esc(typeof v === 'object' ? JSON.stringify(v) : v)}`)
                      .join(' · ');
                    return `<tr>
                      <td><code>${esc(target)}</code></td>
                      <td>${esc(name || '—')}</td>
                      <td><span class="sev ${sevClass(severity)}">${esc(String(severity || '—').toUpperCase())}</span></td>
                      <td><span class="ctx">${ctx || '—'}</span></td>
                    </tr>`;
                  }).join('');
                }

                const tbody = document.querySelector('#trend tbody');
                tbody.innerHTML = trend.slice(-30).reverse().map(row => `
                  <tr>
                    <td>${esc(row.run_id || '—')}</td>
                    <td>${n(row.total_findings)}</td>
                    <td>${n(row.high)}</td>
                    <td>${n(row.medium)}</td>
                    <td>${n(row.low)}</td>
                  </tr>
                `).join('');
              }

              main().catch(err => {
                document.getElementById('run-meta').textContent = `Failed to load audit data: ${err.message}`;
              });
            </script>
          </body>
          </html>
          HTML

          touch "${workdir}/.nojekyll"
          git -C "${workdir}" config user.name "github-actions[bot]"
          git -C "${workdir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${workdir}" add .

          if git -C "${workdir}" diff --cached --quiet; then
            echo "No findings page changes to publish."
            exit 0
          fi

          git -C "${workdir}" commit -m "Publish audit findings ${run_id}"
          git -C "${workdir}" push origin gh-pages
