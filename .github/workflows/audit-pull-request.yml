name: GCP Audit (PR)

on:
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: stackql/stackql-audit-action@v0.1
        with:
          project-id: ${{ vars.GCP_PROJECT_ID }}
          gcp-credentials: ${{ secrets.GCP_SA_JSON }}
          fail-on-severity: HIGH
