name: Preflight FinOps Remediation PR (stackql, OIDC)

# Runs when a remediation PR is opened/updated. Per finding, executes the
# stackql preflight_query supplied by the audit upstream
# (suggested_remediation.preflight_query). Auth + install mirror the audit's
# own oidc composite action verbatim so the preflight sees what the audit
# saw — same stackql binary, same auth bridge, same env.
#
# Pass criterion per finding: stackql returns >= 1 row.

on:
  pull_request:
    paths:
      - 'remediations/proposed/**'

permissions:
  id-token: write       # OIDC
  contents: read        # read PR head
  pull-requests: write  # sticky comment

concurrency:
  group: preflight-finops-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Locate finding directories changed in this PR
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mapfile -t files < <(
            git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" -- \
              'remediations/proposed/**/finding.json'
          )
          if [ "${#files[@]}" -eq 0 ]; then
            mapfile -t pre < <(
              git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" -- \
                'remediations/proposed/**/preflight.sql'
            )
            for p in "${pre[@]}"; do files+=("$(dirname "$p")/finding.json"); done
          fi
          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no finding.json added/modified in this PR"
            exit 0
          fi
          printf '%s\n' "${files[@]}" > "$RUNNER_TEMP/finding-files.txt"
          echo "has_files=true" >> "$GITHUB_OUTPUT"
          printf '::notice::will preflight: %s\n' "${files[@]}"

      # --- AUTH (OIDC, read-only) — mirrors actions/oidc auth steps -----
      - name: AWS OIDC
        if: steps.changed.outputs.has_files == 'true'
        id: aws_auth
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.STACKQL_ID_FED_AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: GCP OIDC
        if: steps.changed.outputs.has_files == 'true'
        id: gcp_auth
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.STACKQL_ID_FED_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.STACKQL_ID_FED_GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Azure OIDC
        if: steps.changed.outputs.has_files == 'true'
        id: azure_auth
        continue-on-error: true
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.STACKQL_ID_FED_AZURE_TENANT_ID }}
          client-id: ${{ secrets.STACKQL_ID_FED_AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_INTEGRATION_TESTING_SUB_ID }}
          allow-no-subscriptions: true

      # --- INSTALL stackql + providers — mirrors actions/oidc install ---
      - name: Install stackql + providers
        if: steps.changed.outputs.has_files == 'true'
        env:
          AWS_AUTH_OK:   ${{ steps.aws_auth.outcome == 'success' }}
          GCP_AUTH_OK:   ${{ steps.gcp_auth.outcome == 'success' }}
          AZURE_AUTH_OK: ${{ steps.azure_auth.outcome == 'success' }}
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          curl -fsSL https://releases.stackql.io/stackql/latest/stackql_linux_amd64.zip -o stackql.zip
          unzip -q stackql.zip && chmod +x stackql
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP:$PATH"

          pull() { stackql exec "registry pull $1;"; }
          [ "$AWS_AUTH_OK"   = "true" ] && pull aws
          [ "$GCP_AUTH_OK"   = "true" ] && pull google
          [ "$AZURE_AUTH_OK" = "true" ] && { pull azure; pull entra_id; }
          echo "::notice::stackql installed; providers pulled"

      # --- BRIDGE federated sessions to stackql ------------------------
      - name: Preflight (stackql per finding)
        if: steps.changed.outputs.has_files == 'true'
        id: preflight
        env:
          FINDING_FILES: ${{ runner.temp }}/finding-files.txt
          SUMMARY_MD:    ${{ runner.temp }}/preflight-summary.md
          AWS_AUTH_OK:   ${{ steps.aws_auth.outcome == 'success' }}
          GCP_AUTH_OK:   ${{ steps.gcp_auth.outcome == 'success' }}
          AZURE_AUTH_OK: ${{ steps.azure_auth.outcome == 'success' }}
        run: |
          set -uo pipefail

          # Build the same --auth JSON the audit's oidc composite builds:
          # AWS uses env vars (no --auth entry); GCP/Azure/entra_id use bearer tokens.
          auth=()
          if [ "$GCP_AUTH_OK" = "true" ]; then
            export GCP_ACCESS_TOKEN="${CLOUDSDK_AUTH_ACCESS_TOKEN:-}"
            if [ -z "$GCP_ACCESS_TOKEN" ] && [ -f "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
              # Fall back to extracting an access token via gcloud if not exported.
              export GCP_ACCESS_TOKEN="$(gcloud auth application-default print-access-token 2>/dev/null || true)"
            fi
            [ -n "$GCP_ACCESS_TOKEN" ] && auth+=('"google":{"type":"bearer","credentialsenvvar":"GCP_ACCESS_TOKEN"}')
          fi
          if [ "$AZURE_AUTH_OK" = "true" ]; then
            export AZURE_ARM_TOKEN="$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv 2>/dev/null || true)"
            export AZURE_GRAPH_TOKEN="$(az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv 2>/dev/null || true)"
            [ -n "$AZURE_ARM_TOKEN"   ] && auth+=('"azure":{"type":"bearer","credentialsenvvar":"AZURE_ARM_TOKEN"}')
            [ -n "$AZURE_GRAPH_TOKEN" ] && auth+=('"entra_id":{"type":"bearer","credentialsenvvar":"AZURE_GRAPH_TOKEN"}')
          fi
          if [ "${#auth[@]}" -gt 0 ]; then
            IFS=','; STACKQL_AUTH="{${auth[*]}}"; unset IFS
          else
            STACKQL_AUTH=""
          fi
          echo "::notice::stackql auth keys = ${auth[*]:-(none)} (AWS via env vars)"

          : > "$SUMMARY_MD"
          pass_total=0; fail_total=0; skip_total=0
          overall="PASS"

          {
            echo "# Preflight — stackql per finding"
            echo
            echo "| status | check | resource | region | rows | detail |"
            echo "| --- | --- | --- | --- | --- | --- |"
          } > "$SUMMARY_MD"

          while IFS= read -r f; do
            [ -f "$f" ] || { echo "::warning::missing $f"; continue; }
            cid="$(jq -r '.check_id' "$f")"
            region="$(jq -r '.region // .fields.region // ""' "$f")"
            resource="$(jq -r '.fields.volumeId // .fields.instanceId // .fields.allocationId // .fields.publicIp // .fields.address // .fields.name // .fields.id // "?"' "$f")"
            q="$(jq -r '.suggested_remediation.preflight_query // empty' "$f")"
            if [ -z "$q" ]; then
              status_word="SKIP"; detail="no preflight_query on finding"; rows=0
            else
              # Run stackql exec with the same args shape as audit.run_stackql.
              if [ -n "$STACKQL_AUTH" ]; then
                out="$(stackql exec --auth "$STACKQL_AUTH" --output json "$q" 2>"$RUNNER_TEMP/_err")"
              else
                out="$(stackql exec --output json "$q" 2>"$RUNNER_TEMP/_err")"
              fi
              rc=$?
              rows=0
              if [ "$rc" -ne 0 ]; then
                status_word="FAIL"; detail="stackql exit $rc: $(head -1 "$RUNNER_TEMP/_err")"
              else
                rows=$(printf '%s' "$out" | jq 'if type=="array" then length else 0 end' 2>/dev/null || echo 0)
                if [ "$rows" -gt 0 ]; then
                  status_word="PASS"; detail="returned $rows row(s)"
                else
                  status_word="FAIL"; detail="0 rows — drift, perms, or upstream SQL wrong"
                fi
              fi
              echo "::group::$cid $resource"
              echo "QUERY : $q"
              echo "ROWS  : $rows"
              echo "STDOUT: $(printf '%s' "$out" | head -c 2000)"
              echo "STDERR: $(cat "$RUNNER_TEMP/_err" 2>/dev/null)"
              echo "::endgroup::"
            fi

            case "$status_word" in
              PASS) pass_total=$((pass_total+1));;
              FAIL) fail_total=$((fail_total+1)); overall="NEEDS-REVIEW";;
              SKIP) skip_total=$((skip_total+1));;
            esac
            printf '| %s | %s | %s | %s | %s | %s |\n' \
              "$status_word" "$cid" "$resource" "$region" "$rows" "$detail" >> "$SUMMARY_MD"
            echo "::notice::$status_word — $cid $resource ($region): $detail"
          done < "$FINDING_FILES"

          printf '\n**Overall: %s** — pass=%d fail=%d skip=%d\n' \
            "$overall" "$pass_total" "$fail_total" "$skip_total" >> "$SUMMARY_MD"

          echo "pass=$pass_total"  >> "$GITHUB_OUTPUT"
          echo "fail=$fail_total"  >> "$GITHUB_OUTPUT"
          echo "skip=$skip_total"  >> "$GITHUB_OUTPUT"
          echo "overall=$overall"  >> "$GITHUB_OUTPUT"
          cat "$SUMMARY_MD" >> "$GITHUB_STEP_SUMMARY"

      - name: Post sticky PR comment
        if: steps.changed.outputs.has_files == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preflight-finops
          path: ${{ runner.temp }}/preflight-summary.md

      - name: Fail check if any preflight failed
        if: steps.changed.outputs.has_files == 'true' && steps.preflight.outputs.overall != 'PASS'
        run: |
          echo "::error::Preflight NEEDS-REVIEW — pass=${{ steps.preflight.outputs.pass }} fail=${{ steps.preflight.outputs.fail }} skip=${{ steps.preflight.outputs.skip }}. See sticky comment."
          exit 1
