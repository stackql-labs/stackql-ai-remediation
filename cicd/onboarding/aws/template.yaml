AWSTemplateFormatVersion: '2010-09-09'
Description: >
  StackQL audit — read-only OIDC role for GitHub Actions.
  Creates (optionally) the GitHub OIDC identity provider in this account, then
  an IAM role trusted to be assumed by the specified GitHub repo. The role has
  SecurityAudit (managed) plus the AWS Cloud Control read permissions stackql
  uses for aws.ec2_native.* queries. No write permissions; this is the
  read-only / "see your waste" tier — mutation creds are a separate template.

Parameters:
  RepoFullName:
    Type: String
    Description: 'GitHub repo allowed to assume this role, as owner/repo (e.g. stackql-labs/stackql-actions-sandbox).'
    AllowedPattern: '^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$'

  SubjectPattern:
    Type: String
    Description: >
      OIDC subject claim pattern allowed to assume the role. Default allows all
      events from the repo (branches, tags, pull_request). Tighten if you want
      to restrict to e.g. ref:refs/heads/main only.
    Default: '*'

  RoleName:
    Type: String
    Description: 'IAM role name for the read-only audit role.'
    Default: 'stackql-audit'

  MutateRoleName:
    Type: String
    Description: 'IAM role name for the write-capable mutate role (trust locked to main-branch only).'
    Default: 'stackql-mutate'

Resources:
  # Custom resource that creates the GitHub OIDC provider if and only if it
  # doesn't already exist in this account. On stack delete it intentionally
  # leaves the provider in place (other stacks may share it).
  OIDCProviderEnsurerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: oidc-provider-ensure
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:ListOpenIDConnectProviders'
                  - 'iam:CreateOpenIDConnectProvider'
                Resource: '*'

  OIDCProviderEnsurerFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt OIDCProviderEnsurerRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json, urllib.request, boto3
          IAM = boto3.client('iam')
          URL = 'https://token.actions.githubusercontent.com'

          def _respond(event, context, status, data=None, reason=''):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f'See CloudWatch log stream: {context.log_stream_name}',
                  'PhysicalResourceId': event.get('PhysicalResourceId') or 'github-oidc-provider',
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {},
              }).encode()
              req = urllib.request.Request(event['ResponseURL'], data=body, method='PUT',
                                           headers={'content-type': ''})
              urllib.request.urlopen(req).read()

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      # Intentionally leave the provider in place.
                      return _respond(event, context, 'SUCCESS')
                  existing = {p['Arn'] for p in IAM.list_open_id_connect_providers()['OpenIDConnectProviderList']}
                  match = next((a for a in existing if a.endswith('oidc-provider/token.actions.githubusercontent.com')), None)
                  if not match:
                      resp = IAM.create_open_id_connect_provider(
                          Url=URL,
                          ClientIDList=['sts.amazonaws.com'],
                          ThumbprintList=['6938fd4d98bab03faadb97b34396831e3780aea1'],
                      )
                      match = resp['OpenIDConnectProviderArn']
                  return _respond(event, context, 'SUCCESS', {'Arn': match})
              except Exception as e:
                  return _respond(event, context, 'FAILED', reason=str(e))

  GitHubOIDCProvider:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt OIDCProviderEnsurerFn.Arn

  StackqlAuditRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': 'sts.amazonaws.com'
              StringLike:
                'token.actions.githubusercontent.com:sub': !Sub 'repo:${RepoFullName}:${SubjectPattern}'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/SecurityAudit'
      Policies:
        - PolicyName: stackql-cloud-control-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cloudformation:ListResources'
                  - 'cloudformation:GetResource'
                  - 'cloudformation:GetResourceRequestStatus'
                  - 'cloudformation:ListResourceRequests'
                Resource: '*'

  StackqlMutateRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref MutateRoleName
      # Trust locked to main-branch context only — PR-context tokens cannot
      # assume this role even if SubjectPattern on the audit role is wide.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': 'sts.amazonaws.com'
                'token.actions.githubusercontent.com:sub': !Sub 'repo:${RepoFullName}:ref:refs/heads/main'
      # Read access for convenience (same workflow does preflight + apply).
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/SecurityAudit'
      Policies:
        - PolicyName: stackql-cloud-control-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cloudformation:ListResources'
                  - 'cloudformation:GetResource'
                  - 'cloudformation:GetResourceRequestStatus'
                  - 'cloudformation:ListResourceRequests'
                Resource: '*'
        - PolicyName: stackql-finops-mutate
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:DeleteVolume'           # unattached-volumes
                  - 'ec2:ReleaseAddress'         # unassociated-eips
                  - 'ec2:TerminateInstances'     # zero-vms-policy
                  - 'cloudformation:DeleteResource'   # stackql Cloud Control delete
                Resource: '*'

Outputs:
  RoleArn:
    Description: 'ARN of the read-only audit role. Paste into the GitHub repo variable STACKQL_ID_FED_AWS_ROLE_ARN.'
    Value: !GetAtt StackqlAuditRole.Arn
  MutateRoleArn:
    Description: 'ARN of the mutate role (main-branch trust only). Paste into the GitHub repo variable STACKQL_ID_FED_AWS_MUTATE_ROLE_ARN.'
    Value: !GetAtt StackqlMutateRole.Arn
  AccountId:
    Description: 'AWS account ID this role lives in.'
    Value: !Ref AWS::AccountId
  LaunchedRegion:
    Description: 'Region the stack was launched in (the role itself is global).'
    Value: !Ref AWS::Region
